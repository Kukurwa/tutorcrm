services:
  web:
    command: sh -c "corepack enable && corepack prepare pnpm@10.8.0 --activate && pnpm install && pnpm --filter @tutorcrm/web dev"
    image: node:20-alpine
    build: !reset null
    working_dir: /repo
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - .:/repo
      - web_node_modules:/repo/node_modules
      - web_next_cache:/repo/apps/web/.next
    ports:
      - "3000:3000"

volumes:
  web_node_modules:
  web_next_cache:
